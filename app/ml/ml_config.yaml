# ML 개발자 설정 (알고리즘 기본 파라미터 + Optuna 탐색 공간)
# 운영자 설정(markets, algorithms, target_days 등)은 DB(ml_train_config)에서 관리

algorithms:
  random_forest:
    classifier: sklearn.ensemble.RandomForestClassifier
    defaults:
      class_weight: "balanced"
      random_state: 42
      n_jobs: -1
    search_space:
      n_estimators: { type: int, low: 100, high: 500, step: 50 }
      max_depth: { type: int, low: 5, high: 20 }
      min_samples_split: { type: int, low: 2, high: 20 }
      min_samples_leaf: { type: int, low: 1, high: 10 }

  xgboost:
    classifier: xgboost.XGBClassifier
    defaults:
      random_state: 42
      eval_metric: "logloss"
      verbosity: 0
    search_space:
      n_estimators: { type: int, low: 100, high: 500, step: 50 }
      max_depth: { type: int, low: 3, high: 10 }
      learning_rate: { type: float, low: 0.01, high: 0.3, log: true }
      subsample: { type: float, low: 0.6, high: 1.0 }
      colsample_bytree: { type: float, low: 0.6, high: 1.0 }
      scale_pos_weight: { type: float, low: 0.5, high: 2.0 }

  lightgbm:
    classifier: lightgbm.LGBMClassifier
    defaults:
      is_unbalance: true
      random_state: 42
      verbose: -1
      n_jobs: 1
    search_space:
      n_estimators: { type: int, low: 100, high: 500, step: 50 }
      num_leaves: { type: int, low: 15, high: 63 }
      learning_rate: { type: float, low: 0.01, high: 0.3, log: true }
      feature_fraction: { type: float, low: 0.6, high: 1.0 }
      bagging_fraction: { type: float, low: 0.6, high: 1.0 }
      bagging_freq: { type: int, low: 1, high: 7 }

  # ============================================================
  # 딥러닝 (Phase 8A)
  # ============================================================

  lstm:
    model_class: ml.deep_learning.architectures.LSTMClassifier
    type: deep_learning
    defaults:
      seq_len: 20
      hidden_size: 128
      num_layers: 2
      dropout: 0.3
      bidirectional: true
      lr: 0.001
      batch_size: 64
      epochs: 100
      patience: 10
      grad_clip: 1.0
    search_space:
      seq_len: { type: int, low: 10, high: 40, step: 5 }
      hidden_size: { type: categorical, choices: [64, 128, 256] }
      num_layers: { type: int, low: 1, high: 3 }
      dropout: { type: float, low: 0.1, high: 0.5 }
      lr: { type: float, low: 0.0001, high: 0.01, log: true }
      batch_size: { type: categorical, choices: [32, 64, 128] }

  transformer:
    model_class: ml.deep_learning.architectures.TransformerClassifier
    type: deep_learning
    defaults:
      seq_len: 20
      d_model: 128
      nhead: 8
      num_layers: 3
      dim_feedforward: 256
      dropout: 0.2
      lr: 0.0005
      batch_size: 64
      epochs: 100
      patience: 10
      grad_clip: 1.0
    search_space:
      seq_len: { type: int, low: 10, high: 40, step: 5 }
      d_model: { type: categorical, choices: [64, 128, 256] }
      nhead: { type: categorical, choices: [4, 8] }
      num_layers: { type: int, low: 2, high: 6 }
      dim_feedforward: { type: categorical, choices: [128, 256, 512] }
      dropout: { type: float, low: 0.1, high: 0.5 }
      lr: { type: float, low: 0.0001, high: 0.01, log: true }
      batch_size: { type: categorical, choices: [32, 64, 128] }

  # ============================================================
  # 강화학습 (Phase 8B)
  # ============================================================

  dqn:
    type: reinforcement
    defaults:
      learning_rate: 0.0001
      buffer_size: 100000
      learning_starts: 1000
      batch_size: 64
      gamma: 0.99
      target_update_interval: 1000
      exploration_fraction: 0.1
      exploration_final_eps: 0.02
      total_timesteps: 100000
      transaction_fee: 0.00015
      tax_rate: 0.0023
    search_space:
      learning_rate: { type: float, low: 0.00005, high: 0.001, log: true }
      buffer_size: { type: categorical, choices: [50000, 100000, 200000] }
      batch_size: { type: categorical, choices: [32, 64, 128] }
      gamma: { type: float, low: 0.95, high: 0.999 }
      target_update_interval: { type: categorical, choices: [500, 1000, 2000] }
      total_timesteps: { type: categorical, choices: [50000, 100000, 200000] }

  ppo:
    type: reinforcement
    defaults:
      learning_rate: 0.0003
      n_steps: 2048
      batch_size: 64
      n_epochs: 10
      gamma: 0.99
      gae_lambda: 0.95
      clip_range: 0.2
      ent_coef: 0.01
      total_timesteps: 100000
      transaction_fee: 0.00015
      tax_rate: 0.0023
    search_space:
      learning_rate: { type: float, low: 0.00005, high: 0.001, log: true }
      n_steps: { type: categorical, choices: [1024, 2048, 4096] }
      batch_size: { type: categorical, choices: [32, 64, 128] }
      n_epochs: { type: int, low: 3, high: 15 }
      gamma: { type: float, low: 0.95, high: 0.999 }
      clip_range: { type: float, low: 0.1, high: 0.3 }
      ent_coef: { type: float, low: 0.001, high: 0.05, log: true }
      total_timesteps: { type: categorical, choices: [50000, 100000, 200000] }
